# Production Docker Compose — for AWS ECS deployment or local production testing
# Usage: APP_MODE=production docker compose -f docker-compose.prod.yml up

services:
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - APP_MODE=production
      - PORT=8080
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - AI_PROVIDER=${AI_PROVIDER:-bedrock}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-anthropic.claude-sonnet-4-20250514-v1:0}
      - STORAGE_DRIVER=s3
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION:-ap-south-1}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - RATE_LIMIT_MAX=60
      - LOG_LEVEL=info
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL=http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
